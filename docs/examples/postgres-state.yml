# bollard with Postgres as state store.
#
# NOTE: The Postgres backend is post-MVP. The schema-compatible interface
# exists in the codebase but is not active in current releases. This example
# shows the intended configuration pattern for when Postgres support ships.
#
# Use this if you are already running Postgres and want to avoid an additional
# SQLite file to manage. For most homelab operators, the default SQLite backend
# (file:/data/bollard.db) is simpler and recommended.
#
# Required .env file:
#   UNIFI_HOST=https://unifi.home.arpa
#   UNIFI_API_KEY=your-api-key-here
#   POSTGRES_PASSWORD=change-me

services:
  bollard:
    image: ghcr.io/j0sh3rs/bollard:latest
    restart: unless-stopped
    network_mode: host
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    env_file: .env
    environment:
      # Postgres DSN — adjust host/user/dbname as needed.
      # When using network_mode: host, 'localhost' resolves to the NAS host,
      # which is where the postgres container's published port listens.
      DATABASE_URL: postgres://bollard:${POSTGRES_PASSWORD}@localhost:5432/bollard?sslmode=disable

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: bollard
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: bollard
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bollard"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
