---
name: ci
"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: bollard
          POSTGRES_USER: bollard
          POSTGRES_DB: bollard_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Test
        env:
          TEST_POSTGRES_DSN: >-
            postgres://bollard:bollard@localhost:5432/bollard_test?sslmode=disable
        run: go test -race ./...
      - name: Build
        run: go build ./...
